<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng tuần hoàn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url(./Fonts/fonts.css);
        *{font-family: Arial, Helvetica, sans-serif}
        .periodic-table {
            display: grid;
            grid-template-columns: 30px repeat(18, 1fr); 
            grid-template-rows: 30px repeat(9, 1fr); 
            gap: 4px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .group-label, .period-label {
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
            font-family: 'Times New Roman', Times, serif;
            color: #555;
            background-color: #f0f0f0;
            border-radius: 4px;
        }
        .group-label {
            height: fit-content;
            padding-top: 4px; padding-bottom: 4px;
            align-self: end;
        }
        .period-label {
            width: 28px;
            justify-self: end;
        }
        .element {
            position: relative;
            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 4px;
            box-sizing: border-box;
        }
        .element:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .element-number {
            position: absolute;
            top: 4px;
            left: 4px;
            font-size: 10px;
        }
        .element-symbol {
            font-size: 24px;
            font-weight: bold;
            margin: 4px 0;
        }
        .element-name {
            font-size: 8px;
            text-align: center;
            margin-bottom: 4px;
        }
        .element-mass {
            font-size: 10px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            background-color: white;
            border-radius: 8px;
            width: 90%;
            max-width: 1100px;
            height: 80%;
            position: relative;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .modal-body {
            flex: 1;
            display: grid;
            grid-template-columns: minmax(0, 1.7fr) minmax(280px, 1fr);
            gap: 20px;
            min-height: 0;
            margin-top: 16px;
            overflow-x: scroll;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .modal-body::-webkit-scrollbar {
            display: none;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: red;
        }
        .settings-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }
        .model-container {
            width: 100%;
            height: 100%;
            min-height: 360px;
            position: relative;
            touch-action: none;
            cursor: grab;
            overflow: hidden;
            border: 1px solid #334155;
            border-radius: 12px;
            background: #000;
        }
        .model-container:active {
            cursor: grabbing;
        }
        .settings-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            z-index: 10;
            display: none;
        }
        .settings-modal.active {
            display: block;
        }
        .settings-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #2196F3;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .info-panel, .note-panel {
            padding: 18px;
            border: 1px solid #dbe4f0;
            border-radius: 12px;
            background: #f8fafc;
            overflow-y: auto;
            min-height: fit-content;            
        }
        .info-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        @media (min-width: 750px) and (max-width: 900px) {
            .info-container {flex-direction: row;}
            .info-panel {flex: 1;min-width: 380px;}
            .note-panel {height: 100%;min-width: 220px; max-width: 220px; width: 220px;}
        }
        .info-panel h3, .note-panel h3{
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: bold;
        }
        .info-line, .note-line {
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
            line-height: 1.5;
        }
        .note-line {
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            align-items: center;
        }
        .info-line:last-child, .note-line:last-child {
            border-bottom: none;
        }
        .info-label {
            font-weight: 700;
            color: #334155;
            display: inline-block;
            min-width: 175px;
        }
        .info-value, .note-lable {
            color: #0f172a;
        }
        .info-value.nhom {
            font-family: 'Times New Roman', Times, serif;
        }
        @media (max-width: 900px) {
            .modal-content {height: 90%;}
            .modal-content h2 {margin-top: 20px;}
            .modal-body {grid-template-columns: 1fr;padding-bottom: 10px;}
            .model-container {min-height: 300px;}
        }
        .alkali-metal { background-color: #FF9E9E; }
        .alkaline-earth { background-color: #FFDEAD; }
        .transition-metal { background-color: #FFC0CB; }
        .post-transition { background-color: #CCCCCC; }
        .metalloid { background-color: #99CC99; }
        .nonmetal { background-color: #A0FFA0; }
        .halogen { background-color: #FFFF99; }
        .noble-gas { background-color: #C0FFFF; }
        .lanthanide, .lanthanide_ { background-color: #FFBFFF; }
        .actinide, .actinide_ { background-color: #FF99CC; }
        .unknown { background-color: #E0E0E0; }
    </style>
</head>

                    </div>

            </div>
            
            <!-- Settings Modal -->

                <div class="flex items-center mb-4">
                    <label class="mr-2">Proton:</label>
                    <label class="switch">
                        <input type="checkbox" id="protonToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div class="flex items-center mb-4">
                    <label class="mr-2">Neutron:</label>
                    <label class="switch">

                    </label>
                </div>
                
                <div class="flex items-center mb-4">

                        <span class="slider"></span>
                    </label>
                </div>
                
                <div class="flex items-center mb-4">

                        <span class="slider"></span>
                    </label>
                </div>

                    <label class="switch">
                        <input type="checkbox" id="electronOrbitToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

            { number: 88, symbol: "Ra", name: "Radium", mass: 226, category: "alkaline-earth", group: 2, period: 7 },
            { number: "89 - 103", symbol: "**", name: "Ac - Lr", mass: "", category: "actinide_", group: 3, period: 7 },
            { number: 89, symbol: "Ac", name: "Actinium", mass: 227, category: "actinide", group: 3, period: 7 },
            { number: 90, symbol: "Th", name: "Thorium", mass: 232.04, category: "actinide", group: null, period: 7 },
            { number: 91, symbol: "Pa", name: "Protactinium", mass: 231.04, category: "actinide", group: null, period: 7 },
            { number: 92, symbol: "U", name: "Uranium", mass: 238.03, category: "actinide", group: null, period: 7 },
            { number: 93, symbol: "Np", name: "Neptunium", mass: 237, category: "actinide", group: null, period: 7 },
            { number: 94, symbol: "Pu", name: "Plutonium", mass: 244, category: "actinide", group: null, period: 7 },
            { number: 95, symbol: "Am", name: "Americium", mass: 243, category: "actinide", group: null, period: 7 },
            { number: 96, symbol: "Cm", name: "Curium", mass: 247, category: "actinide", group: null, period: 7 },
            { number: 97, symbol: "Bk", name: "Berkelium", mass: 247, category: "actinide", group: null, period: 7 },
            { number: 98, symbol: "Cf", name: "Californium", mass: 251, category: "actinide", group: null, period: 7 },
            { number: 99, symbol: "Es", name: "Einsteinium", mass: 252, category: "actinide", group: null, period: 7 },
            { number: 100, symbol: "Fm", name: "Fermium", mass: 257, category: "actinide", group: null, period: 7 },
            { number: 101, symbol: "Md", name: "Mendelevium", mass: 258, category: "actinide", group: null, period: 7 },
            { number: 102, symbol: "No", name: "Nobelium", mass: 259, category: "actinide", group: null, period: 7 },
            { number: 103, symbol: "Lr", "name": "Lawrencium", "mass": 262, "category": "actinide", "group": 3, "period": 7 },
            { number: 104, symbol: "Rf", name: "Rutherfordium", mass: 267, category: "transition-metal", group: 4, period: 7 },
            { number: 105, symbol: "Db", name: "Dubnium", mass: 270, category: "transition-metal", group: 5, period: 7 },
            { number: 106, symbol: "Sg", name: "Seaborgium", mass: 271, category: "transition-metal", group: 6, period: 7 },
            { number: 107, symbol: "Bh", name: "Bohrium", mass: 270, category: "transition-metal", group: 7, period: 7 },
            { number: 108, symbol: "Hs", name: "Hassium", mass: 277, category: "transition-metal", group: 8, period: 7 },
            { number: 109, symbol: "Mt", name: "Meitnerium", mass: 276, category: "transition-metal", group: 9, period: 7 },
            { number: 110, symbol: "Ds", name: "Darmstadtium", mass: 281, category: "transition-metal", group: 10, period: 7 },
            { number: 111, symbol: "Rg", name: "Roentgenium", mass: 280, category: "transition-metal", group: 11, period: 7 },
            { number: 112, symbol: "Cn", name: "Copernicium", mass: 285, category: "transition-metal", group: 12, period: 7 },
            { number: 113, symbol: "Nh", name: "Nihonium", mass: 286, category: "post-transition", group: 13, period: 7 },
            { number: 114, symbol: "Fl", name: "Flerovium", mass: 289, category: "post-transition", group: 14, period: 7 },
            { number: 115, symbol: "Mc", name: "Moscovium", mass: 290, category: "post-transition", group: 15, period: 7 },
            { number: 116, symbol: "Lv", name: "Livermorium", mass: 293, category: "post-transition", group: 16, period: 7 },
            { number: 117, symbol: "Ts", name: "Tennessine", mass: 294, category: "halogen", group: 17, period: 7 },
            { number: 118, symbol: "Og", name: "Oganesson", mass: 294, category: "noble-gas", group: 18, period: 7 }
        ];

        // Get reference to the periodic table container
        const periodicTable = document.getElementById('periodicTable');
        
        // Create empty cells for the periodic table layout and populate elements
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const elementDiv = document.createElement('div');
            elementDiv.className = `element ${element.category}`;
            elementDiv.innerHTML = `
                <span class="element-number">${element.number}</span>
                <span class="element-symbol">${element.symbol}</span>
                <span class="element-name">${element.name}</span>
                <span class="element-mass">${element.mass}</span>
            `;
            
            // Position the element based on group and period
            let gridColumn = element.group + 1; // +1 because of the period label column
            let gridRow = element.period + 1; // +1 because of the group label row
            
            // Handle Lanthanides and Actinides
            if (element.category === 'lanthanide') {
                gridRow = 8 + 1; // Row 8 in the layout, +1 for group labels
                gridColumn = element.number - 57 + 3 + 1; // Starts at column 3, +1 for period labels
            } else if (element.category === 'actinide') {
                gridRow = 9 + 1; // Row 9 in the layout, +1 for group labels
                gridColumn = element.number - 89 + 3 + 1; // Starts at column 3, +1 for period labels
            }
            
            // Special cases for Hydrogen and Helium
            if (element.number === 1) {
                gridColumn = 1 + 1; // Column 1, +1 for period labels
                gridRow = 1 + 1; // Row 1, +1 for group labels
            } else if (element.number === 2) {
                gridColumn = 18 + 1; // Column 18, +1 for period labels
                gridRow = 1 + 1; // Row 1, +1 for group labels
            }
            
            elementDiv.style.gridColumn = gridColumn;
            elementDiv.style.gridRow = gridRow;
            
            elementDiv.addEventListener('click', () => showElementModal(element));
            periodicTable.appendChild(elementDiv);
        }
        
        // Modal functionality
        const elementModal = document.getElementById('elementModal');
        const closeModal = document.getElementById('closeModal');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettings = document.getElementById('closeSettings');
        const modalTitle = document.getElementById('modalTitle');
        const modelContainer = document.getElementById('modelContainer');
        const elementInfo = document.getElementById('elementInfo');
        
        // 3D model variables
        let scene, camera, renderer, sceneRoot, particles = [];
        let protonToggle, neutronToggle, electronToggle, electronMoveToggle, electronOrbitToggle;
        let animationFrameId;
        let currentElement = null;
        const interactionState = {
            isPointerDown: false,
            pointers: new Map(),
            lastX: 0,
            lastY: 0,
            pinchDistance: null,
            rotationX: -0.35,
            rotationY: 0.45,
            targetRotationX: -0.35,
            targetRotationY: 0.45,
            zoom: 30,
            targetZoom: 30
        };

        function destroy3DModel() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            if (scene) {
                scene.traverse((object) => {
                    if (object.geometry) {
                        object.geometry.dispose();
                    }

                    if (object.material) {
                        if (Array.isArray(object.material)) {
                            object.material.forEach((material) => material.dispose());
                        } else {
                            object.material.dispose();
                        }
                    }
                });
            }

            if (renderer) {
                if (renderer.domElement.parentNode === modelContainer) {
                    modelContainer.removeChild(renderer.domElement);
                }
                renderer.dispose();
            }

            particles = [];
            scene = null;
            camera = null;
            renderer = null;
            sceneRoot = null;
        }

        function rerenderCurrentModel() {
            if (elementModal.classList.contains('active') && currentElement && typeof currentElement.number === 'number') {
                init3DModel(currentElement.number);
            }
        }

        function formatCategory(category) {
            const categoryNames = {
                'alkali-metal': 'Kim loại',
                'alkaline-earth': 'Kim loại',
                'transition-metal': 'Kim loại',
                'post-transition': 'Kim loại',
                'metalloid': 'Á kim',
                'nonmetal': 'Phi kim',
                'halogen': 'Halogen',
                'noble-gas': 'Khí hiếm',
                'lanthanide': 'Lantan',
                'lanthanide_': 'Dãy Lantan',
                'actinide': 'Actini',
                'actinide_': 'Dãy Actini',
                'unknown': 'Chưa xác định'
            };

            return categoryNames[category] || category;
        }

        function formatGroup(group) {
            const groupNames = {
                1: 'IA',
                2: 'IIA',
                3: 'IIIB',
                4: 'IVB',
                5: 'VB',
                6: 'VIB',
                7: 'VIIB',
                8: 'VIIIB',
                9: 'VIIIB',
                10: 'VIIIB',
                11: 'IB',
                12: 'IIB',
                13: 'IIIA',
                14: 'IVA',
                15: 'VA',
                16: 'VIA',
                17: 'VIIA',
                18: 'VIIIA',
                null: 'IIIB'
            };

            return groupNames[group] || "Không xác định";
        }

        function updateInfoPanel(element) {
            elementInfo.innerHTML = `
                <div class="info-line"><span class="info-label">Số hiệu nguyên tử</span><span class="info-value">${element.number}</span></div>
                <div class="info-line"><span class="info-label">Khối lượng nguyên tử</span><span class="info-value">${element.mass}</span></div>
                <div class="info-line"><span class="info-label">Loại</span><span class="info-value">${formatCategory(element.category)}</span></div>
                <div class="info-line"><span class="info-label">Nhóm</span><span class="info-value nhom">${formatGroup(element.group)}</span></div>
                <div class="info-line"><span class="info-label">Chu kì</span><span class="info-value">${element.period}</span></div>
            `;
        }

        function clampZoom(value) {
            return Math.min(70, Math.max(16, value));
        }

        function getPointerDistance() {
            const points = Array.from(interactionState.pointers.values());
            if (points.length < 2) {
                return null;
            }

            const dx = points[0].x - points[1].x;
            const dy = points[0].y - points[1].y;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function attachModelInteractions() {
            if (modelContainer.dataset.interactionsBound === 'true') {
                return;
            }

            modelContainer.dataset.interactionsBound = 'true';

            modelContainer.addEventListener('pointerdown', (event) => {
                modelContainer.setPointerCapture(event.pointerId);
                interactionState.isPointerDown = true;
                interactionState.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
                interactionState.lastX = event.clientX;
                interactionState.lastY = event.clientY;
                interactionState.pinchDistance = getPointerDistance();
            });

            modelContainer.addEventListener('pointermove', (event) => {
                if (!interactionState.pointers.has(event.pointerId)) {
                    return;
                }

                interactionState.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });

                if (interactionState.pointers.size >= 2) {
                    const nextDistance = getPointerDistance();
                    if (interactionState.pinchDistance !== null && nextDistance !== null) {
                        interactionState.targetZoom = clampZoom(interactionState.targetZoom - (nextDistance - interactionState.pinchDistance) * 0.03);
                    }
                    interactionState.pinchDistance = nextDistance;
                    return;
                }

                if (!interactionState.isPointerDown) {
                    return;
                }

                const deltaX = event.clientX - interactionState.lastX;
                const deltaY = event.clientY - interactionState.lastY;
                interactionState.targetRotationY += deltaX * 0.01;
                interactionState.targetRotationX += deltaY * 0.01;
                interactionState.targetRotationX = Math.max(-1.3, Math.min(1.3, interactionState.targetRotationX));
                interactionState.lastX = event.clientX;
                interactionState.lastY = event.clientY;
            });

            const endPointer = (event) => {
                interactionState.pointers.delete(event.pointerId);
                interactionState.isPointerDown = interactionState.pointers.size > 0;
                interactionState.pinchDistance = getPointerDistance();
            };

            modelContainer.addEventListener('pointerup', endPointer);
            modelContainer.addEventListener('pointercancel', endPointer);
            modelContainer.addEventListener('pointerleave', endPointer);

            modelContainer.addEventListener('wheel', (event) => {
                event.preventDefault();
                interactionState.targetZoom = clampZoom(interactionState.targetZoom + event.deltaY * 0.02);
            }, { passive: false });
        }

        // Handle window resize event
        function onWindowResize() {
            if (camera && renderer && modelContainer) {
                camera.aspect = modelContainer.clientWidth / modelContainer.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(modelContainer.clientWidth, modelContainer.clientHeight);
                renderer.setPixelRatio(window.devicePixelRatio || 1);
            }
        }
        window.addEventListener('resize', onWindowResize);

        function showElementModal(element) {
            currentElement = element;
            modalTitle.textContent = `${element.name} (${element.symbol})`;
            updateInfoPanel(element);
            
            elementModal.classList.add('active');

            if (typeof element.number === 'number') {
                init3DModel(element.number);
            } else {
                destroy3DModel();
            }
        }
        
        closeModal.addEventListener('click', () => {
            elementModal.classList.remove('active');
            destroy3DModel();
        });
        
        settingsBtn.addEventListener('click', () => {
            settingsModal.classList.add('active');
        });
        
        closeSettings.addEventListener('click', () => {
            settingsModal.classList.remove('active');
        });
        
        // Initialize 3D model
        function init3DModel(atomicNumber) {
            destroy3DModel();
            attachModelInteractions();
            
            // Get settings toggles
            protonToggle = document.getElementById('protonToggle');
            neutronToggle = document.getElementById('neutronToggle');
            electronToggle = document.getElementById('electronToggle');
            electronMoveToggle = document.getElementById('electronMoveToggle');
            electronOrbitToggle = document.getElementById('electronOrbitToggle');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            sceneRoot = new THREE.Group();
            scene.add(sceneRoot);
            
            camera = new THREE.PerspectiveCamera(75, modelContainer.clientWidth / modelContainer.clientHeight, 0.1, 1000);
            interactionState.zoom = 30;
            interactionState.targetZoom = 30;
            interactionState.rotationX = -0.35;
            interactionState.rotationY = 0.45;
            interactionState.targetRotationX = -0.35;
            interactionState.targetRotationY = 0.45;
            camera.position.set(0, 0, interactionState.zoom);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio || 1);
            renderer.setSize(modelContainer.clientWidth, modelContainer.clientHeight);
            modelContainer.appendChild(renderer.domElement);
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
            directionalLight.position.set(12, 10, 16);
            scene.add(directionalLight);

            const fillLight = new THREE.DirectionalLight(0x9ec5ff, 0.5);
            fillLight.position.set(-10, -6, -10);
            scene.add(fillLight);
            
            // Create nucleus (protons and neutrons)
            const elementData = elements.find(e => e.number === atomicNumber);
            const protonsCount = atomicNumber;
            const neutronsCount = elementData ? Math.round(elementData.mass || atomicNumber * 2) - protonsCount : 0;
            
            // Tính toán bán kính hạt nhân động dựa trên tổng số hạt (A)
            // Công thức: R = r0 * A^(1/3). Sử dụng hệ số 0.55 để các hạt (bán kính 0.8) lồng vào nhau.
            const totalNucleons = protonsCount + neutronsCount;
            const dynamicNucleusRadius = Math.max(0.1, 0.55 * Math.pow(totalNucleons, 1/3));

            const protonRadius = 0.8;  // To hơn để tạo hiệu ứng dính
            const neutronRadius = 0.8;
            
            // Tạo danh sách tổng hợp để trộn lẫn Proton và Neutron
            let nucleons = [];
            if (protonToggle.checked) {
                for (let i = 0; i < protonsCount; i++) nucleons.push('proton');
            }
            if (neutronToggle.checked) {
                for (let i = 0; i < neutronsCount; i++) nucleons.push('neutron');
            }

            // Xáo trộn vị trí để các hạt xanh đỏ đan xen nhau
            nucleons.sort(() => Math.random() - 0.5);

            nucleons.forEach(type => {
                const geometry = new THREE.SphereGeometry(type === 'proton' ? protonRadius : neutronRadius, 12, 12);
                const material = new THREE.MeshPhongMaterial({ color: type === 'proton' ? 0xff0000 : 0x0000ff });
                const nucleon = new THREE.Mesh(geometry, material);
                
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                // Phân bổ trong bán kính động đã tính toán
                const r = Math.pow(Math.random(), 0.5) * dynamicNucleusRadius;
                
                nucleon.position.x = r * Math.sin(phi) * Math.cos(theta);
                nucleon.position.y = r * Math.sin(phi) * Math.sin(theta);
                nucleon.position.z = r * Math.cos(phi);
                
                sceneRoot.add(nucleon);
                particles.push({ object: nucleon, type: type });
            });
            
            // Create electrons if enabled
            if (electronToggle.checked) {
                const electronRadius = 0.35;
                const electronShells = getElectronShells(atomicNumber);
                
                for (let shell = 0; shell < electronShells.length; shell++) {
                    const electronsInShell = electronShells[shell];
                    const shellRadius = 8 + shell * 2;
                    
                    // Create orbit if enabled
                    if (electronOrbitToggle.checked) {
                        const orbitGeometry = new THREE.RingGeometry(shellRadius - 0.05, shellRadius + 0.05, 64);
                        const orbitMaterial = new THREE.MeshBasicMaterial({ color: 0x64748b, side: THREE.DoubleSide, transparent: true, opacity: 0.35 });
                        const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
                        orbit.rotation.x = Math.PI / 2;
                        sceneRoot.add(orbit);
                    }

                    for (let i = 0; i < electronsInShell; i++) {
                        const electronGeometry = new THREE.SphereGeometry(electronRadius, 16, 16);
                        const electronMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
                        const electron = new THREE.Mesh(electronGeometry, electronMaterial);
                        
                        // Position electron in orbit
                        const angle = (i / electronsInShell) * Math.PI * 2;
                        electron.position.x = shellRadius * Math.cos(angle);
                        electron.position.z = shellRadius * Math.sin(angle);
                        electron.position.y = 0;
                        
                        // Store electron properties for animation
                        particles.push({ 
                            object: electron, 
                            type: 'electron',
                            shell: shell,
                            angle: angle,
                            speed: 0.02 / (shell + 1) + Math.random() * 0.005,
                            radius: shellRadius
                        });
                        
                        sceneRoot.add(electron);
                    }
                }
            }
            
            // Animation loop
            function animate() {
                animationFrameId = requestAnimationFrame(animate);
                
                // Rotate electrons if movement is enabled
                if (electronMoveToggle.checked) {
                    particles.forEach(particle => {
                        if (particle.type === 'electron') {
                            particle.angle += particle.speed;
                            particle.object.position.x = particle.radius * Math.cos(particle.angle);
                            particle.object.position.z = particle.radius * Math.sin(particle.angle);
                        }
                    });
                }

                if (sceneRoot) {
                    interactionState.rotationX += (interactionState.targetRotationX - interactionState.rotationX) * 0.12;
                    interactionState.rotationY += (interactionState.targetRotationY - interactionState.rotationY) * 0.12;
                    interactionState.zoom += (interactionState.targetZoom - interactionState.zoom) * 0.14;

                    sceneRoot.rotation.x = interactionState.rotationX;
                    sceneRoot.rotation.y = interactionState.rotationY;
                    camera.position.z = interactionState.zoom;
                    camera.lookAt(0, 0, 0);
                }
                
                renderer.render(scene, camera);
            }
            
            animate();
        }
        
        // Helper function to calculate electron shells
        function getElectronShells(atomicNumber) {
            const shells = [];
            let remainingElectrons = atomicNumber;
            
            // Electron shell capacities: 2, 8, 18, 32, ...
            // Updated shell capacities for more accuracy with heavier elements
            const shellCapacities = [2, 8, 18, 32, 50, 72, 98]; // Added capacities for higher shells
            
            for (let i = 0; i < shellCapacities.length && remainingElectrons > 0; i++) {
                const electronsInShell = Math.min(shellCapacities[i], remainingElectrons);
                shells.push(electronsInShell);
                remainingElectrons -= electronsInShell;
            }
            
            // Handle cases where there are too many electrons for known shells (for superheavy elements)
            if (remainingElectrons > 0) {
                shells.push(remainingElectrons);
            }

            return shells;
        }
        
        // Settings toggles event listeners
        document.getElementById('protonToggle').addEventListener('change', rerenderCurrentModel);
        
        document.getElementById('neutronToggle').addEventListener('change', rerenderCurrentModel);
        
        document.getElementById('electronToggle').addEventListener('change', rerenderCurrentModel);
        
        document.getElementById('electronMoveToggle').addEventListener('change', () => {
            // No need to reinitialize, just toggle movement (handled in animate function)
        });

        document.getElementById('electronOrbitToggle').addEventListener('change', rerenderCurrentModel);
    </script>
